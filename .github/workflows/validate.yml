name: Validate

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install Linux UI test dependencies
        run: sudo apt-get update && sudo apt-get install --yes xvfb libwebkit2gtk-4.1-dev

      - name: Install dependencies
        run: npm ci

      - name: Validate cold checkout
        run: xvfb-run -a npm run test:cold
