<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900"><rect width="1500" height="900" fill="#171a1f"/><style>text{font-family:Inter,Arial}.p{fill:#20242a;stroke:#3b414a}.r{fill:#2b3037}.t{fill:#f4f5f7}.m{fill:#aab2bd}.a{fill:#ffd45a}.e{fill:#ffb4ab}</style>
  <text x="28" y="36" class="m" font-size="17">D05 · Estados contextuales del panel Preview — layout real de tres paneles</text><rect x="28" y="55" width="380" height="800" rx="16" class="p"/><rect x="425" y="55" width="420" height="800" rx="16" class="p"/><rect x="862" y="55" width="610" height="800" rx="16" class="p"/>
  <text x="56" y="98" class="m" font-size="14">NAVEGACIÓN</text><rect x="56" y="130" width="324" height="72" rx="11" fill="#36577e"/><text x="76" y="162" class="t" font-size="17">Component Classes</text><text x="76" y="185" class="m" font-size="13">Objeto no renderizable</text>
  <text x="453" y="98" class="m" font-size="14">EDITOR</text><rect x="453" y="130" width="364" height="80" rx="11" class="r"/><text x="476" y="176" class="t" font-size="18">General</text>
  <text x="890" y="98" class="m" font-size="14">PREVIEW</text><text x="890" y="132" class="m" font-size="13">NO RENDERIZABLE</text><rect x="890" y="148" width="554" height="180" rx="12" fill="#252a31" stroke="#59616d"/><text x="1167" y="198" text-anchor="middle" class="t" font-size="20" font-weight="700">Este objeto no tiene vista previa</text><text x="1167" y="232" text-anchor="middle" class="m" font-size="15">Selecciona una variante, módulo o Screen renderizable.</text><rect x="1028" y="258" width="278" height="46" rx="9" fill="#2d323a" stroke="#626a76"/><text x="1167" y="280" text-anchor="middle" class="t" font-size="14">Acción solo si el destino es determinista</text><text x="1167" y="301" text-anchor="middle" class="m" font-size="12">p. ej. “Abrir variante Default”</text>
  <text x="890" y="370" class="m" font-size="13">LOADING · PREVIEW ANTERIOR CONSERVADA</text><rect x="890" y="386" width="554" height="160" rx="12" fill="#17263a"/><rect x="905" y="401" width="524" height="130" rx="10" fill="#24384d" opacity=".75"/><circle cx="1060" cy="465" r="18" fill="none" stroke="#f0b90b" stroke-width="4" stroke-dasharray="28 18"/><text x="1100" y="456" class="t" font-size="18" font-weight="600">Preparando preview…</text><text x="1100" y="486" class="m" font-size="14">Componente: Bubble · Variante: Bubble · frame 124</text><text x="1100" y="512" class="m" font-size="13">Capa local de progreso; no spinner global.</text>
  <text x="890" y="588" class="m" font-size="13">ERROR</text><rect x="890" y="604" width="554" height="190" rx="12" fill="#352427" stroke="#a94a52"/><text x="922" y="650" class="e" font-size="20" font-weight="700">No se pudo resolver la preview</text><text x="922" y="683" class="t" font-size="15">Falta el medio “hero-video.mp4”.</text><text x="922" y="713" class="m" font-size="14">El editor y los valores no se han descartado.</text><rect x="922" y="735" width="115" height="42" rx="8" fill="#2d323a" stroke="#7f8792"/><text x="979" y="762" text-anchor="middle" class="t" font-size="14">Reintentar</text><rect x="1050" y="735" width="158" height="42" rx="8" fill="#2d323a" stroke="#7f8792"/><text x="1129" y="762" text-anchor="middle" class="t" font-size="14">Ver detalles</text>
  <text x="56" y="825" class="m" font-size="13">Ancho reducido: título + razón + acción principal; detalles pasan a área expandible.</text>
</svg>
